# Use Ctrl+A as prefix
unbind C-b
set -g prefix C-a

# Pane switching with Alt+arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Create new panes and windows with current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Reorder windows around, left or right
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Use mouse to select pane
set -g mouse on

# Focus events to panes
set -g focus-events on

# Pass through extended keys (Shift+Enter, Ctrl+Shift+*, etc.) to applications.
# Required for tools like OpenCode that bind Shift+Enter inside a tmux session.
set -g extended-keys on

# Ensure tmux uses 256-colour + extended-key-capable terminfo.
# This tells tmux to advertise extended key support to inner applications.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:extkeys"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Highlight current window
set-window-option -g window-status-current-style bg=yellow

# 12 hour time
set-window-option -g clock-mode-style 12

# Enable Tmux Package Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Install the Hide Pane plugin
set -g @plugin 'jfrydell/tmux-hide-pane'

# Powerline status themes
set -g @plugin 'jimeh/tmux-themepack'
set -g @themepack 'powerline/default/cyan'

# Override time to 12h. Set before `run` so the theme's -goq on line 15 skips it,
# and line 43's recomposition (prefix + this + suffix) preserves it unchanged.
set -g @themepack-status-right-area-left-format "%I:%M:%S %p"

# Reload tmux.conf file
bind r source-file ~/.tmux.conf \; display "Reloaded .tmux.conf file"

# Use VIM style navigation
setw -g mode-keys vi

# TMUX Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Run the Tmux Package Manager (Must be at the bottom)
run '~/.tmux/plugins/tpm/tpm'
